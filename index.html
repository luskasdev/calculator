<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luskas Calc</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #555;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            animation: appEntry 1s ease-out;
        }

        @keyframes appEntry {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .calc-container {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            width: 340px;
            position: relative;
        }

        /* Display Estilizado */
        .display-wrapper {
            margin-bottom: 30px;
            padding: 10px;
        }

        #display {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            text-align: right;
            font-size: 3rem;
            font-weight: 200;
            outline: none;
            letter-spacing: -2px;
        }

        #history {
            color: var(--text-dim);
            text-align: right;
            font-size: 0.9rem;
            height: 20px;
            margin-bottom: 5px;
        }

        /* Grade de Botões */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            height: 65px;
            border-radius: 20px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 400;
            cursor: pointer;
            transition: var(--transition);
        }

            button:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.1);
                transform: scale(1.05);
            }

            button:active {
                transform: scale(0.95);
            }

        .op {
            color: var(--accent);
            font-weight: 600;
        }

        .clear {
            color: #ff3b3b;
        }

        .equal {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            grid-column: span 2;
        }

            .equal:hover {
                background: #fff;
                box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            }

        /* Botão do GitHub Customizado */
        .dev-profile {
            margin-top: 40px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            background: #111;
            border-radius: 50px;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: var(--transition);
        }

            .dev-profile:hover {
                border-color: var(--accent);
                color: var(--accent);
                background: #000;
                box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            }

            .dev-profile svg {
                fill: currentColor;
            }
    </style>
</head>
<body>

    <div class="calc-container">
        <div class="display-wrapper">
            <div id="history"></div>
            <input type="text" id="display" readonly placeholder="0">
        </div>

        <div class="grid">
            <button class="clear" onclick="clearAll()">AC</button>
            <button class="op" onclick="append('(')">(</button>
            <button class="op" onclick="append(')')">)</button>
            <button class="op" onclick="append('/')">÷</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="op" onclick="append('*')">×</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="op" onclick="append('-')">−</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="op" onclick="append('+')">+</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <!-- Link para seu GitHub -->
    <a href="https://github.com/luskasdev"  target="_blank" class="dev-profile">
        <svg height="20" width="20" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        GITHUB.COM/LUSKASDEV
    </a>

    <script>
        const display = document.getElementById('display');
        const historyDiv = document.getElementById('history');

        function append(value) {
            if (display.value === 'Error') clearAll();
            display.value += value;
        }

        function clearAll() {
            display.value = '';
            historyDiv.innerText = '';
        }

        function calculate() {
            try {
                const expression = display.value;
                const result = new Function('return ' + expression)();

                historyDiv.innerText = expression + ' =';
                display.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(8));
            } catch (e) {
                display.value = 'Error';
            }
        }

        // Suporte ao teclado melhorado
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (/[0-9\/\*\-\+\.\(\)]/.test(key)) append(key);
            if (key === 'Enter') { e.preventDefault(); calculate(); }
            if (key === 'Escape') clearAll();
            if (key === 'Backspace') display.value = display.value.slice(0, -1);
        });
    </script>
</body>
</html>
